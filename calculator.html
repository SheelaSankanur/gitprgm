<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

.calculator {
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    padding: 20px;
    width: 320px;
}

.display {
    margin-bottom: 20px;
}

#display {
    width: 100%;
    padding: 20px;
    font-size: 32px;
    text-align: right;
    border: 2px solid #e0e0e0;
    border-radius: 10px;
    background-color: #f5f5f5;
    color: #333;
    font-weight: bold;
}

#display:focus {
    outline: none;
    border-color: #667eea;
    background-color: #fff;
}

.buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
}

.btn {
    padding: 20px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background-color: #f0f0f0;
    color: #333;
    font-weight: bold;
    transition: all 0.3s ease;
}

.btn:hover {
    background-color: #e0e0e0;
    transform: translateY(-2px);
}

.btn:active {
    transform: translateY(0);
    background-color: #d0d0d0;
}

.btn.operator {
    background-color: #667eea;
    color: #fff;
}

.btn.operator:hover {
    background-color: #5568d3;
}

.btn.operator:active {
    background-color: #445bb8;
}

.btn.clear {
    background-color: #ff6b6b;
    color: #fff;
    grid-column: 1;
}

.btn.clear:hover {
    background-color: #ff5252;
}

.btn.clear:active {
    background-color: #ff3838;
}

.btn.zero {
    grid-column: span 2;
}

.btn.equals {
    background-color: #51cf66;
    color: #fff;
    grid-column: span 2;
}

.btn.equals:hover {
    background-color: #40c057;
}

.btn.equals:active {
    background-color: #37b24d;
}
</style>
</head>
<body>
    <div class="calculator">
        <div class="display">
            <input type="text" id="display" placeholder="0" readonly>
        </div>
        <div class="buttons">
            <button class="btn clear" onclick="clearDisplay()">C</button>
            <button class="btn operator" onclick="appendOperator('/')">/</button>
            <button class="btn operator" onclick="appendOperator('*')">*</button>
            <button class="btn operator" onclick="deleteLast()">←</button>

            <button class="btn" onclick="appendNumber('7')">7</button>
            <button class="btn" onclick="appendNumber('8')">8</button>
            <button class="btn" onclick="appendNumber('9')">9</button>
            <button class="btn operator" onclick="appendOperator('-')">-</button>

            <button class="btn" onclick="appendNumber('4')">4</button>
            <button class="btn" onclick="appendNumber('5')">5</button>
            <button class="btn" onclick="appendNumber('6')">6</button>
            <button class="btn operator" onclick="appendOperator('+')">+</button>

            <button class="btn" onclick="appendNumber('1')">1</button>
            <button class="btn" onclick="appendNumber('2')">2</button>
            <button class="btn" onclick="appendNumber('3')">3</button>
            <button class="btn operator" onclick="appendOperator('.')">.​</button>

            <button class="btn zero" onclick="appendNumber('0')">0</button>
            <button class="btn equals" onclick="calculate()">=</button>
        </div>
    </div>

    <script>let display = document.getElementById('display');

function appendNumber(number) {
    if (display.value === '0') {
        display.value = number;
    } else {
        display.value += number;
    }
}

function appendOperator(operator) {
    let value = display.value;
    
    // Prevent multiple operators in a row
    if (value === '' || value.endsWith('+') || value.endsWith('-') || value.endsWith('*') || value.endsWith('/') || value.endsWith('.')) {
        return;
    }
    
    display.value += operator;
}

function clearDisplay() {
    display.value = '0';
}

function deleteLast() {
    let value = display.value;
    if (value.length > 1) {
        display.value = value.slice(0, -1);
    } else {
        display.value = '0';
    }
}

function calculate() {
    try {
        let value = display.value;
        
        // Prevent calculation if expression is incomplete
        if (value.endsWith('+') || value.endsWith('-') || value.endsWith('*') || value.endsWith('/')) {
            return;
        }
        
        let result = eval(value);
        display.value = result;
    } catch (error) {
        display.value = 'Error';
        setTimeout(() => {
            display.value = '0';
        }, 1500);
    }
}

// Allow keyboard input
document.addEventListener('keydown', (event) => {
    const key = event.key;
    
    if (key >= '0' && key <= '9') {
        appendNumber(key);
    } else if (key === '+' || key === '-' || key === '*' || key === '/') {
        appendOperator(key);
    } else if (key === '.') { 
        appendOperator('.');
    } else if (key === 'Enter' || key === '=') {
        calculate();
    } else if (key === 'Backspace') {
        deleteLast();
    } else if (key === 'Escape') {
        clearDisplay();
    }
});
</script>  
</body>
</html>
